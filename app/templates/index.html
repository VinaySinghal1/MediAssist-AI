<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Medical Chatbot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:linear-gradient(135deg,#4F46E5,#06B6D4);
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;

}

.chat-container{

    width:900px;
    max-width:95%;

    background:white;

    border-radius:20px;

    box-shadow:0 10px 40px rgba(0,0,0,.2);

    overflow:hidden;

}

.header{

    background:#1E3A8A;
    color:white;

    padding:25px;

    text-align:center;

}

.header h1{

    font-size:32px;

}

.header p{

    margin-top:8px;

    color:#ddd;

}

.chat-box{

    height:500px;

    overflow-y:auto;

    padding:25px;

    background:#F8FAFC;

}

.message{

    margin-bottom:20px;

    display:flex;

}

.user{

    justify-content:flex-end;

}

.assistant{

    justify-content:flex-start;

}

.bubble{

    max-width:75%;

    padding:15px;

    border-radius:18px;

    line-height:1.6;

    word-wrap:break-word;

}

.user .bubble{

    background:#2563EB;

    color:white;

    border-bottom-right-radius:5px;

}

.assistant .bubble{

    background:white;

    border:1px solid #ddd;

    border-bottom-left-radius:5px;

}

.error{

    color:red;

    text-align:center;

    padding:15px;

}

.form-area{

    padding:20px;

    border-top:1px solid #ddd;

}

textarea{

    width:100%;

    height:90px;

    border-radius:12px;

    border:1px solid #bbb;

    resize:none;

    padding:15px;

    font-size:16px;

    outline:none;

}

textarea:focus{

    border-color:#2563EB;

}

.buttons{

    display:flex;

    justify-content:space-between;

    margin-top:15px;

}

button{

    border:none;

    padding:12px 28px;

    font-size:16px;

    border-radius:10px;

    cursor:pointer;

    transition:.3s;

}

.send{

    background:#2563EB;

    color:white;

}

.send:hover{

    background:#1D4ED8;

}

.clear{

    background:#EF4444;

    color:white;

}

.clear:hover{

    background:#DC2626;

}

.role{

    font-weight:bold;

    margin-bottom:8px;

}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">

<h1>🩺 AI Medical Chatbot</h1>

<p>Ask your medical questions and receive AI-powered answers.</p>

</div>

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

<div class="chat-box" id="chat-box">

{% for msg in messages %}

<div class="message {{ msg.role }}">

<div class="bubble">

<div class="role">

{% if msg.role=="user" %}

👤 You

{% else %}

🤖 AI Assistant

{% endif %}

</div>

<div>

{{ msg.content | safe | nl2br }}

</div>

</div>

</div>

{% endfor %}

</div>

<div class="form-area">

<form method="POST" action="{{ url_for('index') }}">

<textarea
name="prompt"
placeholder="Type your medical question here..."
required></textarea>

<div class="buttons">

<button class="send" type="submit">

Send

</button>

</form>

<form method="GET" action="{{ url_for('clear') }}">

<button class="clear" type="submit">

Clear Chat

</button>

</form>

</div>

</div>

</div>

<script>

const chatBox=document.getElementById("chat-box");

chatBox.scrollTop=chatBox.scrollHeight;

</script>

</body>

</html>
